name: Unflatten and Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unflatten files (-- becomes /)
        run: |
          set -e
          shopt -s nullglob
          for f in *--*; do
            [ -f "$f" ] || continue
            target=$(echo "$f" | sed 's|--|/|g')
            mkdir -p "$(dirname "$target")"
            mv "$f" "$target"
            echo "Moved: $f -> $target"
          done
          # Восстанавливаем .gitignore из DOT_gitignore (если есть)
          if [ -f DOT_gitignore ]; then mv DOT_gitignore .gitignore; fi
          echo "--- Tree ---"
          find . -type f -not -path './.git/*' -not -path './.github/workflows/build.yml' | sort

      - name: Commit unflattened structure (so future pushes are normal)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: unflatten project structure"
            git push || echo "Push failed (probably already up to date), continuing"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-agent-0.1.${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
